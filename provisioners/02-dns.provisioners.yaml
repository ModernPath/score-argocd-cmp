# DNS provisioner override
# Reads the hostname from the ARGOCD_ENV_DOMAIN environment variable
# instead of generating a random localhost hostname.

- uri: cmd://sh#dns-from-env
  type: dns
  description: Outputs the domain from the ARGOCD_ENV_DOMAIN environment variable.
  args:
    - "-c"
    - |
      DOMAIN="${ARGOCD_ENV_DOMAIN:-localhost}"
      echo "{\"resource_outputs\":{\"host\":\"${DOMAIN}\"}}"
  expected_outputs:
    - host
