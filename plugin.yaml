apiVersion: argoproj.io/v1alpha1
kind: ConfigManagementPlugin
metadata:
  name: score-k8s
spec:
  version: v1.0
  discover:
    find:
      command: ["score-argocd-cmp", "discover"]
  parameters:
    static:
      - name: provisioners-url
        title: Provisioners OCI URL (without version tag)
        required: true
        string: ""
      - name: provisioners-version
        title: Provisioners version tag
        required: false
        string: "latest"
    dynamic:
      command: ["score-argocd-cmp", "discover-params"]
  init:
    command: ["score-argocd-cmp", "init"]
  generate:
    command: ["score-argocd-cmp", "generate"]
