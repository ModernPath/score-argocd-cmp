apiVersion: argoproj.io/v1alpha1
kind: ConfigManagementPlugin
metadata:
  name: score-k8s
spec:
  version: v1.0
  discover:
    find:
      command: ["score-argocd-cmp", "discover"]
  parameters:
    static:
      - name: provisioners-url
        title: Provisioners URL
        required: true
        string: ""
      - name: no-default-provisioners
        title: Disable default provisioners
        string: "false"
      - name: debug
        title: Enable debug logging
        string: "false"
    dynamic:
      command: ["score-argocd-cmp", "discover-params"]
  init:
    command: ["score-argocd-cmp", "init"]
  generate:
    command: ["score-argocd-cmp", "generate"]
