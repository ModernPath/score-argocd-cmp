apiVersion: argoproj.io/v1alpha1
kind: ConfigManagementPlugin
metadata:
  name: score-k8s
spec:
  version: v1.0
  discover:
    find:
      command: ["score-cmp", "discover"]
  parameters:
    static:
      - name: provisioners-url
        title: Provisioners OCI URL (without version tag)
        required: true
        string: ""
      - name: provisioners-version
        title: Provisioners version tag
        required: false
        string: "latest"
    dynamic:
      command: ["score-cmp", "discover-params"]
  init:
    command: ["sh", "-c"]
    args:
      - |
        PROV_FLAGS=""
        if [ -n "${PARAM_PROVISIONERS_URL:-}" ]; then
          VERSION="${PARAM_PROVISIONERS_VERSION:-latest}"
          PROV_FLAGS="--provisioners ${PARAM_PROVISIONERS_URL}:${VERSION}"
        fi
        score-k8s init --no-sample $PROV_FLAGS
  generate:
    command: ["bash", "-c"]
    args:
      - |
        for f in $(score-cmp discover); do
          img=$(score-cmp resolve-image "$f")
          score-k8s generate "$f" \
            --image "$img" \
            --namespace "${ARGOCD_APP_NAMESPACE:-default}" \
            2>/dev/null
        done
        cat manifests.yaml
