apiVersion: score.dev/v1b1
metadata:
  name: my-api
containers:
  api:
    image: .
    variables:
      PORT: "8080"
      DB_HOST: ${resources.db.host}
      DB_PORT: ${resources.db.port}
      DB_NAME: ${resources.db.name}
      REDIS_HOST: ${resources.redis.host}
    volumes:
      - source: ${resources.data}
        target: /data
service:
  ports:
    http:
      port: 80
      targetPort: 8080
resources:
  db:
    type: postgres
  redis:
    type: redis
  data:
    type: volume
