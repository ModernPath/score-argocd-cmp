apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hello-world
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/your-app.git
    targetRevision: main
    path: .
    plugin:
      env:
        - name: IMAGE
          value: "your-registry/hello-world:v1.0.0"
        - name: NAMESPACE
          value: "production"
  destination:
    server: https://kubernetes.default.svc
    namespace: production
